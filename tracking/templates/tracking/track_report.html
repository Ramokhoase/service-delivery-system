{% extends 'base.html' %}
{% block title %}CityMenderSA — Track Your Report{% endblock %}

{% block extra_css %}
<style>
  body {
    background: #c8ddb0;
    background-image:
      linear-gradient(rgba(140,175,100,0.6) 1px, transparent 1px),
      linear-gradient(90deg, rgba(140,175,100,0.6) 1px, transparent 1px),
      linear-gradient(rgba(140,175,100,0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(140,175,100,0.3) 1px, transparent 1px);
    background-size: 100px 100px, 100px 100px, 25px 25px, 25px 25px;
  }

  .page-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
  }

  .card {
    background: white;
    border-radius: 14px;
    padding: 36px 32px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.09);
    text-align: center;
  }

  .icon { font-size: 42px; margin-bottom: 16px; }

  .card h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #1a1a1a;
  }

  .card p {
    font-size: 13px;
    color: #666;
    margin-bottom: 24px;
    line-height: 1.6;
  }

  label {
    display: block;
    text-align: left;
    font-size: 13px;
    font-weight: 600;
    color: #333;
    margin-bottom: 6px;
  }

  input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
    font-family: monospace;
    letter-spacing: 2px;
    text-align: center;
    text-transform: uppercase;
    color: #1a1a1a;
    background: #fafafa;
    margin-bottom: 20px;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: #1a5c2a;
    background: white;
  }

  .submit-btn {
    width: 100%;
    padding: 13px;
    background: #1a5c2a;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  .submit-btn:hover { background: #145022; }

  .back-link {
    margin-top: 20px;
    font-size: 13px;
    color: #666;
    text-align: center;
  }

  .back-link a {
    color: #1a5c2a;
    font-weight: 600;
    text-decoration: none;
  }
</style>
{% endblock %}

{% block content %}
<div class="page-body">
  <div class="card">
    <div class="icon">&#128269;</div>
    <h2>Track Your Report</h2>
    <p>Enter the reference number that was sent to you via SMS after you submitted your report.</p>

    <form method="GET" action="{% url 'track_result' %}">
      <label for="ref">Reference Number</label>
      <input type="text" name="ref" id="ref" placeholder="e.g. CM-A1B2C3D4" required/>
      <button type="submit" class="submit-btn">Track Issue</button>
    </form>
  </div>

  <div class="back-link">
    <a href="{% url 'report_form' %}">Report a new issue</a>
  </div>
</div>
{% endblock %}
